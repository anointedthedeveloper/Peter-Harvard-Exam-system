<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Admin Console – Peter Harvard International Schools</title>
<link rel="icon" type="image/png" href="Badgejet.jpg">
<link rel="stylesheet" href="css/font-awesome.min.css">
<link rel="stylesheet" href="css/common.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#dc2626">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PHIS Admin">
<style>
.screen { display: flex; min-height: 100vh; }
#app {
  display: flex;
  min-height: 100vh;
  flex-direction: column;
}
.topbar {
  background: white;
  border-bottom: 2px solid #f0f0f0;
  padding: 0 32px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: contain; background: white; padding: 4px; border: 2px solid #f0f0f0; }
.topbar-logo-fb { width: 48px; height: 48px; border-radius: 8px; background: #dc2626; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px; }
.topbar-name { font-size: 16px; font-weight: 700; color: #1e1e1e; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.admin-chip {
  background: #f8f8f8;
  border: 2px solid #e0e0e0;
  padding: 8px 20px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  color: #1e1e1e;
}
.admin-chip i {
  color: #dc2626;
  margin-right: 6px;
}

.main-content { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
.page-heading { 
  font-size: 28px; 
  font-weight: 700; 
  margin-bottom: 8px; 
  color: #1e1e1e;
  display: flex;
  align-items: center;
  gap: 12px;
}
.page-heading i {
  color: #dc2626;
  font-size: 32px;
}
.page-sub { 
  font-size: 16px; 
  color: #666; 
  margin-bottom: 32px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 24px;
  margin-bottom: 40px;
}
.stat-card {
  background: white;
  border: 2px solid #f0f0f0;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.stat-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: #f8f8f8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #dc2626;
  margin-bottom: 16px;
}
.stat-value {
  font-size: 32px;
  font-weight: 700;
  color: #1e1e1e;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 14px;
  color: #666;
  font-weight: 600;
}

.section {
  background: white;
  border: 2px solid #f0f0f0;
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 32px;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid #f0f0f0;
}
.section-title {
  font-size: 20px;
  font-weight: 700;
  color: #1e1e1e;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title i {
  color: #dc2626;
}

.user-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border: 2px solid #f0f0f0;
  border-radius: 12px;
  margin-bottom: 12px;
  transition: all 0.2s ease;
}
.user-item:hover {
  border-color: #dc2626;
  transform: translateY(-2px);
}
.user-info { flex: 1; }
.user-name {
  font-size: 16px;
  font-weight: 600;
  color: #1e1e1e;
  margin-bottom: 4px;
}
.user-id {
  font-size: 13px;
  color: #666;
}
.user-class {
  font-size: 13px;
  color: #666;
}
.user-actions {
  display: flex;
  gap: 8px;
}

.btn-sm {
  padding: 8px 16px;
  font-size: 13px;
  border-radius: 6px;
  border: 2px solid #e0e0e0;
  background: white;
  color: #1e1e1e;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-sm:hover {
  border-color: #dc2626;
  color: #dc2626;
}
.btn-sm i {
  font-size: 12px;
}

.empty-exams {
  text-align: center;
  padding: 60px 20px;
  background: #f8f8f8;
  border: 2px dashed #e0e0e0;
  border-radius: 12px;
  color: #666;
}
.empty-exams i {
  font-size: 48px;
  color: #dc2626;
  margin-bottom: 16px;
  display: block;
}

.audit-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border: 2px solid #f0f0f0;
  border-radius: 12px;
  margin-bottom: 12px;
}
.audit-info { flex: 1; }
.audit-action {
  font-size: 16px;
  font-weight: 600;
  color: #1e1e1e;
  margin-bottom: 4px;
}
.audit-details {
  font-size: 13px;
  color: #666;
}
.audit-time {
  font-size: 13px;
  color: #666;
  font-weight: 600;
}

@media (max-width: 768px) {
  .main-content { padding: 20px; }
  .stats-grid { grid-template-columns: 1fr; }
  .user-item { flex-direction: column; align-items: flex-start; gap: 12px; }
  .user-actions { width: 100%; justify-content: flex-start; }
}
</style>
</head>
<body>
<div class="loader-overlay" id="loaderOverlay" style="display:none">
  <div class="loader-spinner"></div>
  <div class="loader-text"><i class="fa fa-spinner"></i> <span id="loaderText">Loading…</span></div>
</div>

<!-- APP SHELL -->
<div class="screen active" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <img src="Badgejet.jpg" class="topbar-logo" alt="Logo" onerror="this.style.display='none';document.getElementById('tbFb').style.display='flex'">
      <div class="topbar-logo-fb" id="tbFb" style="display:none">PH</div>
      <div class="topbar-name">Peter Harvard Int'l Schools</div>
    </div>
    <div class="topbar-right">
      <div class="admin-chip" id="adminChip"><i class="fa fa-user"></i> Admin</div>
      <button class="btn-ghost" onclick="doLogout()">
        <i class="fa fa-sign-out"></i> Sign Out
      </button>
    </div>
  </div>

  <div class="main-content">
    <div class="page-heading">
      <i class="fa fa-cogs"></i>
      Admin Console
    </div>
    <div class="page-sub">Manage users and system settings</div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fa fa-users"></i></div>
        <div class="stat-value" id="statUsers">0</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fa fa-file-text"></i></div>
        <div class="stat-value" id="statExams">0</div>
        <div class="stat-label">Total Exams</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fa fa-check-circle"></i></div>
        <div class="stat-value" id="statResults">0</div>
        <div class="stat-label">Results</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">
          <i class="fa fa-users"></i>
          User Management
        </div>
      </div>
      <div id="usersList"><div class="empty-exams"><i class="fa fa-spinner fa-spin"></i>Loading users…</div></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">
          <i class="fa fa-history"></i>
          Audit Trail
        </div>
      </div>
      <div id="auditList"><div class="empty-exams"><i class="fa fa-spinner fa-spin"></i>Loading audit log…</div></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="js/common.js"></script>
<script src="js/admin.js"></script>
<script>
window.addEventListener('load', async () => {
  showLoader('Checking session…');
  const hasSession = await checkSession();
  hideLoader();
  
  if (!hasSession) {
    window.location.href = 'admin-login.html';
    return;
  }
  
  document.getElementById('adminChip').innerHTML = `<i class="fa fa-user"></i> ${A.adminName}`;
  
  loadUsers();
  loadAuditLog();
});
</script>
</body>
</html>
