<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Exam Submitted – Peter Harvard International Schools</title>
<link rel="icon" type="image/png" href="Badgejet.jpg">
<link rel="stylesheet" href="css/font-awesome.min.css">
<link rel="stylesheet" href="css/common.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#dc2626">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PHIS Exam">
<style>
.screen { display: flex; min-height: 100vh; }
#s-submitted {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #f8f8f8;
  padding: 24px;
}
.submitted-card {
  background: white;
  border: 2px solid #f0f0f0;
  border-radius: 24px;
  width: 100%;
  max-width: 500px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.05);
  overflow: hidden;
}
.submitted-header {
  background: #1e1e1e;
  padding: 48px 40px 40px;
  color: white;
}
.check-circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(220, 38, 38, 0.2);
  border: 3px solid #dc2626;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}
.check-circle i {
  font-size: 40px;
  color: #dc2626;
}
.submitted-header h2 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.submitted-header p { font-size: 16px; opacity: 0.9; }
.submitted-body { padding: 40px; }
.sub-name { 
  font-weight: 700; 
  color: #1e1e1e; 
  font-size: 20px; 
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.sub-name i {
  color: #dc2626;
}
.sub-exam { 
  color: #666; 
  font-size: 15px; 
  margin-bottom: 32px;
}
.sub-note {
  background: #f8f8f8;
  border: 2px solid #f0f0f0;
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 14px;
  color: #666;
  line-height: 1.7;
  margin-bottom: 28px;
}
.sub-note i {
  color: #dc2626;
  margin-right: 6px;
}
.btn-back-home {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 8px;
  background: #1e1e1e;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-back-home i {
  font-size: 14px;
}
.btn-back-home:hover { 
  background: #dc2626;
  transform: translateY(-1px);
  box-shadow: 0 8px 16px rgba(220, 38, 38, 0.2);
}
.submitted-footer {
  padding: 20px 40px;
  background: #f8f8f8;
  border-top: 2px solid #f0f0f0;
  font-size: 13px;
  color: #666;
}
</style>
</head>
<body>
<div class="loader-overlay" id="loaderOverlay" style="display:none">
  <div class="loader-spinner"></div>
  <div class="loader-text"><i class="fa fa-spinner"></i> <span id="loaderText">Loading…</span></div>
</div>

<!-- SUBMITTED SCREEN -->
<div class="screen active" id="s-submitted">
  <div class="submitted-card">
    <div class="submitted-header">
      <div class="check-circle">
        <i class="fa fa-check"></i>
      </div>
      <h2>Exam Submitted!</h2>
      <p>Your answers have been recorded successfully</p>
    </div>
    <div class="submitted-body">
      <div class="sub-name"><i class="fa fa-user"></i> <span id="subStudentName">Student</span></div>
      <div class="sub-exam"><i class="fa fa-file-text"></i> <span id="subExamName">Exam</span></div>
      <div class="sub-note" id="highestMarkDisplay" style="display:none; color:#dc2626; font-weight:700; margin-top:12px;">
        <i class="fa fa-trophy"></i> Class Highest: 0%
      </div>
      <div class="sub-note">
        <i class="fa fa-info-circle"></i> Your exam has been submitted. Results will be available in your dashboard.
      </div>
      <button class="btn-back-home" id="submittedContinueBtn" onclick="continueAfterSubmit()">
        <i class="fa fa-dashboard"></i> Continue to Dashboard
      </button>
    </div>
    <div class="submitted-footer">
      <div><i class="fa fa-copyright"></i> Peter Harvard International Schools v2.0</div>
      <div class="dev-tag"><i class="fa fa-code"></i> Developed by <span>anointedthedeveloper</span></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="js/common.js"></script>
<script src="js/student.js"></script>
<script>
window.addEventListener('load', async () => {
  showLoader('Checking session…');
  const hasSession = await checkSession();
  hideLoader();
  
  if (!hasSession) {
    window.location.href = 'student-login.html';
    return;
  }
  
  document.getElementById('subStudentName').innerHTML = `<i class="fa fa-user"></i> ${S.studentName}`;
  document.getElementById('subExamName').innerHTML = `<i class="fa fa-file-text"></i> ${S.examName || 'Exam'}`;
});
</script>
</body>
</html>
